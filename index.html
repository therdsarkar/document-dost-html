<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document Dost</title>
  <meta name="description" content="Document Dost helps you create documents, ask AI for guidance, describe your problem, and get the right document support quickly." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --navy:#071a3d;
      --navy-2:#0a2557;
      --blue:#2563ff;
      --blue-2:#0ea5ff;
      --green:#11b981;
      --purple:#7c3aed;
      --orange:#ff9d22;
      --text:#0f172a;
      --muted:#5b6475;
      --line:#e6ebf3;
      --card:#ffffff;
      --bg:#f6f9ff;
      --shadow:0 16px 40px rgba(13, 38, 76, 0.10);
      --radius:24px;
      --radius-sm:16px;
      --container:1240px;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      font-family:'Inter',sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(37,99,255,0.10), transparent 28%),
        radial-gradient(circle at top right, rgba(14,165,255,0.10), transparent 24%),
        linear-gradient(180deg,#f8fbff 0%, #f3f7ff 100%);
      line-height:1.5;
    }
    a{text-decoration:none;color:inherit}
    img{max-width:100%;display:block}
    .container{width:min(var(--container), calc(100% - 32px));margin:0 auto}

    /* NAVBAR */
    .site-header{
      position:sticky;
      top:0;
      z-index:1000;
      background:rgba(7,26,61,0.98);
      backdrop-filter: blur(10px);
      box-shadow:0 8px 30px rgba(0,0,0,0.10);
    }
    .nav{
      min-height:88px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      padding:14px 0;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }
    .brand-mark{
      width:58px;
      height:58px;
      border-radius:14px;
      background:linear-gradient(135deg,#3a7bff,#0052ea);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:22px;
      font-weight:800;
      box-shadow:0 12px 30px rgba(37,99,255,0.28);
      flex-shrink:0;
    }
    .brand-text{min-width:0}
    .brand-title{
      color:#fff;
      font-size:20px;
      font-weight:800;
      line-height:1.1;
    }
    .brand-sub{
      color:rgba(255,255,255,0.78);
      font-size:13px;
      margin-top:4px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:280px;
    }
    .nav-links{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .nav-link{
      color:#eef4ff;
      font-weight:600;
      padding:12px 16px;
      border-radius:12px;
      transition:0.25s ease;
      display:flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
    }
    .nav-link:hover{background:rgba(255,255,255,0.08)}
    .login-btn{
      background:linear-gradient(135deg,#3b82f6,#2563ff);
      color:#fff;
      padding:14px 22px;
      border-radius:14px;
      font-weight:700;
      box-shadow:0 14px 28px rgba(37,99,255,0.25);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      white-space:nowrap;
    }

    /* HERO */
    .hero{
      position:relative;
      padding:54px 0 34px;
      overflow:hidden;
    }
    .hero::before{
      content:"";
      position:absolute;
      inset:auto auto 20% 5%;
      width:180px;
      height:180px;
      background:radial-gradient(circle, rgba(37,99,255,0.08) 0 3px, transparent 3px 100%);
      background-size:18px 18px;
      opacity:0.9;
      pointer-events:none;
    }
    .hero::after{
      content:"";
      position:absolute;
      top:-60px;
      right:-60px;
      width:320px;
      height:320px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(37,99,255,0.10), rgba(37,99,255,0.02) 55%, transparent 70%);
      pointer-events:none;
    }
    .hero-inner{text-align:center;position:relative;z-index:1}
    .hero h1{
      font-size:clamp(40px, 6vw, 76px);
      line-height:1.02;
      font-weight:800;
      letter-spacing:-0.03em;
      max-width:980px;
      margin:0 auto;
      color:#071a3d;
    }
    .hero h1 .accent{
      color:#2563ff;
      display:block;
      margin-top:6px;
    }
    .hero-sub{
      max-width:820px;
      margin:22px auto 0;
      font-size:clamp(17px, 2.1vw, 20px);
      line-height:1.65;
      color:#3f4b61;
    }
    .trust-row{
      margin:24px auto 0;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:16px;
      flex-wrap:wrap;
      color:#0f172a;
      font-weight:600;
    }
    .trust-row::before,.trust-row::after{
      content:"";
      width:96px;
      height:1px;
      background:#d6deea;
    }
    .trust-item{
      display:flex;
      align-items:center;
      gap:8px;
      color:#1f2d45;
      font-size:18px;
    }
    .dot{
      width:6px;height:6px;border-radius:50%;
      background:#64748b;display:inline-block;
    }

    /* ACTION CARDS */
    .action-grid{
      margin-top:34px;
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:28px;
    }
    .action-card{
      background:rgba(255,255,255,0.88);
      border:1px solid rgba(230,235,243,0.95);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:32px 26px 28px;
      text-align:center;
      transition:0.25s ease;
      backdrop-filter: blur(8px);
    }
    .action-card:hover{
      transform:translateY(-4px);
      box-shadow:0 20px 45px rgba(13, 38, 76, 0.14);
    }
    .icon-circle{
      width:88px;height:88px;border-radius:50%;
      margin:0 auto 22px;
      display:flex;align-items:center;justify-content:center;
      font-size:40px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,0.6);
    }
    .icon-blue{ background:linear-gradient(180deg,#eef4ff,#dfeaff); color:#2563ff; }
    .icon-green{ background:linear-gradient(180deg,#ebfff7,#d7fff0); color:#11b981; }
    .icon-purple{ background:linear-gradient(180deg,#f5efff,#eadcff); color:#7c3aed; }
    .icon-orange{ background:linear-gradient(180deg,#fff4e8,#ffe6c7); color:#ff9d22; }

    .action-card h3{
      font-size:18px;
      line-height:1.35;
      font-weight:800;
      color:#0c1a33;
      margin-bottom:12px;
      min-height:48px;
    }
    .action-card p{
      color:#4f5a6f;
      font-size:16px;
      line-height:1.7;
      min-height:82px;
    }
    .action-btn{
      margin-top:20px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:100%;
      min-height:48px;
      border:none;
      border-radius:14px;
      color:#fff;
      font-weight:700;
      font-size:16px;
      box-shadow:0 12px 24px rgba(15,23,42,0.08);
      cursor:pointer;
    }
    .btn-blue{ background:linear-gradient(135deg,#3478ff,#2563ff); }
    .btn-green{ background:linear-gradient(135deg,#12c68b,#09ad74); }
    .btn-purple{ background:linear-gradient(135deg,#8b44ff,#6f31eb); }
    .btn-orange{ background:linear-gradient(135deg,#ffb13b,#ff931c); }

    /* WALLET BAR */
    .wallet-bar{
      margin-top:28px;
      background:linear-gradient(90deg, rgba(17,185,129,0.08), rgba(14,165,255,0.06));
      border:1px solid rgba(17,185,129,0.18);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:26px 30px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
    }
    .wallet-left{
      display:flex;
      align-items:center;
      gap:18px;
      min-width:0;
    }
    .wallet-icon{
      width:64px;height:64px;border-radius:50%;
      background:linear-gradient(180deg,#eafff6,#d6fff0);
      display:flex;align-items:center;justify-content:center;
      font-size:30px;color:#11b981;flex-shrink:0;
    }
    .wallet-left h3{
      font-size:20px;
      font-weight:800;
      color:#0d1b34;
    }
    .wallet-left p{
      color:#516076;
      margin-top:4px;
      font-size:16px;
    }
    .wallet-btn{
      flex-shrink:0;
      min-width:230px;
      min-height:54px;
      padding:0 24px;
      border-radius:16px;
      color:#fff;
      background:linear-gradient(135deg,#13c589,#09ad74);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      box-shadow:0 14px 30px rgba(17,185,129,0.22);
    }

    /* TRUST STRIP */
    .trust-strip{
      margin-top:34px;
      background:#fff;
      border-top:1px solid rgba(230,235,243,0.9);
      border-bottom:1px solid rgba(230,235,243,0.9);
    }
    .trust-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:0;
    }
    .trust-box{
      padding:26px 20px;
      display:flex;
      align-items:flex-start;
      gap:16px;
      position:relative;
    }
    .trust-box:not(:last-child)::after{
      content:"";
      position:absolute;
      right:0;
      top:24px;
      bottom:24px;
      width:1px;
      background:#e7edf6;
    }
    .trust-box .t-icon{
      font-size:32px;
      line-height:1;
      flex-shrink:0;
      margin-top:2px;
    }
    .trust-box h4{
      font-size:18px;
      font-weight:800;
      color:#12203c;
      margin-bottom:4px;
    }
    .trust-box p{
      color:#5c677b;
      font-size:15px;
      line-height:1.6;
    }

    /* SECTION COMMON */
    .section{padding:74px 0}
    .section-title{
      text-align:center;
      max-width:820px;
      margin:0 auto 18px;
    }
    .section-title h2{
      font-size:clamp(30px, 4vw, 48px);
      line-height:1.08;
      font-weight:800;
      color:#091a3d;
      letter-spacing:-0.02em;
    }
    .section-title p{
      margin-top:14px;
      font-size:18px;
      line-height:1.75;
      color:#58657a;
    }

    /* SERVICES */
    .services-grid{
      margin-top:36px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:24px;
    }
    .service-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:28px;
    }
    .service-card h3{
      font-size:21px;
      font-weight:800;
      color:#0c1b35;
      margin-bottom:10px;
    }
    .service-card p{
      color:#5a667a;
      line-height:1.8;
      margin-bottom:16px;
      font-size:15px;
    }
    .service-list{
      display:grid;
      gap:12px;
      margin-top:10px;
    }
    .service-list li{
      list-style:none;
      display:flex;
      gap:10px;
      align-items:flex-start;
      color:#22314d;
      font-size:15px;
      line-height:1.6;
    }
    .service-list li::before{
      content:"✓";
      color:#2563ff;
      font-weight:800;
      margin-top:1px;
      flex-shrink:0;
    }

    /* STEPS */
    .steps{
      margin-top:36px;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:24px;
    }
    .step-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:28px 24px;
      position:relative;
      overflow:hidden;
    }
    .step-number{
      width:52px;height:52px;border-radius:16px;
      background:linear-gradient(135deg,#3b82f6,#2563ff);
      color:#fff;
      display:flex;align-items:center;justify-content:center;
      font-weight:800;font-size:20px;
      box-shadow:0 14px 28px rgba(37,99,255,0.22);
      margin-bottom:18px;
    }
    .step-card h3{
      font-size:20px;
      font-weight:800;
      margin-bottom:10px;
      color:#0d1d39;
    }
    .step-card p{
      color:#5b667a;
      font-size:15px;
      line-height:1.8;
    }

    /* WALLET SECTION */
    .wallet-section-wrap{
      margin-top:34px;
      display:grid;
      grid-template-columns:1.15fr 0.85fr;
      gap:28px;
    }
    .wallet-panel,
    .wallet-support{
      background:#fff;
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:32px;
    }
    .wallet-panel h3,
    .wallet-support h3{
      font-size:28px;
      font-weight:800;
      color:#0d1c38;
      margin-bottom:14px;
    }
    .wallet-panel p,
    .wallet-support p{
      color:#5b677c;
      line-height:1.9;
      font-size:16px;
    }
    .wallet-balance{
      margin-top:20px;
      background:linear-gradient(135deg,#eff8ff,#f7fbff);
      border:1px solid #dfe9f7;
      border-radius:22px;
      padding:22px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
    }
    .wallet-balance small{
      display:block;
      color:#64748b;
      font-size:14px;
      margin-bottom:6px;
      font-weight:600;
    }
    .wallet-balance strong{
      font-size:34px;
      color:#071a3d;
      font-weight:800;
    }
    .wallet-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      background:#ebfff6;
      color:#0faa73;
      font-weight:700;
      font-size:14px;
    }
    .wallet-options{
      margin-top:24px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:16px;
    }
    .wallet-option{
      background:#f9fbff;
      border:1px solid #e8edf6;
      border-radius:20px;
      padding:20px;
    }
    .wallet-option h4{
      font-size:18px;
      font-weight:800;
      color:#10213f;
      margin-bottom:8px;
    }
    .wallet-option p{
      color:#5c677b;
      font-size:14px;
      line-height:1.7;
    }
    .wallet-action-row{
      margin-top:24px;
      display:flex;
      gap:14px;
      flex-wrap:wrap;
    }
    .wallet-main-btn,
    .wallet-ghost-btn{
      min-height:50px;
      padding:0 20px;
      border-radius:14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      cursor:pointer;
      border:none;
    }
    .wallet-main-btn{
      background:linear-gradient(135deg,#13c589,#09ad74);
      color:#fff;
      box-shadow:0 14px 30px rgba(17,185,129,0.22);
    }
    .wallet-ghost-btn{
      background:#eff6ff;
      color:#2563ff;
      border:1px solid #dbe8ff;
    }
    .wallet-support ul{
      margin-top:18px;
      display:grid;
      gap:14px;
    }
    .wallet-support li{
      list-style:none;
      color:#22314d;
      line-height:1.8;
      display:flex;
      gap:12px;
      align-items:flex-start;
    }
    .wallet-support li::before{
      content:"•";
      color:#2563ff;
      font-size:20px;
      line-height:1;
      margin-top:2px;
    }

    /* FOUNDER */
    .founder-wrap{
      margin-top:34px;
      display:grid;
      grid-template-columns:420px 1fr;
      gap:34px;
      align-items:center;
      background:#fff;
      border:1px solid var(--line);
      border-radius:32px;
      box-shadow:var(--shadow);
      padding:34px;
    }
    .founder-image{
      border-radius:28px;
      overflow:hidden;
      box-shadow:0 18px 40px rgba(12, 28, 58, 0.18);
      background:#f2f5fb;
      min-height:520px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .founder-image img{
      width:100%;
      height:100%;
      object-fit:cover;
    }
    .founder-content .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 16px;
      border-radius:999px;
      background:rgba(37,99,255,0.08);
      color:#2563ff;
      font-weight:700;
      font-size:14px;
      margin-bottom:18px;
    }
    .founder-content h2{
      font-size:clamp(30px, 4vw, 48px);
      line-height:1.08;
      font-weight:800;
      color:#091a3d;
      letter-spacing:-0.02em;
    }
    .founder-name{
      margin-top:14px;
      font-size:28px;
      font-weight:800;
      color:#0f1e3c;
    }
    .founder-role{
      margin-top:8px;
      color:#2563ff;
      font-size:18px;
      font-weight:700;
    }
    .founder-tagline{
      margin-top:16px;
      font-size:18px;
      line-height:1.8;
      color:#22314d;
      font-weight:600;
    }
    .founder-desc{
      margin-top:18px;
      color:#58657a;
      font-size:16px;
      line-height:1.95;
      max-width:760px;
    }
    .founder-meta{
      margin-top:24px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:16px;
    }
    .meta-card{
      background:#f8fbff;
      border:1px solid #e7edf7;
      border-radius:18px;
      padding:18px;
    }
    .meta-card span{
      display:block;
      font-size:13px;
      color:#64748b;
      margin-bottom:6px;
      font-weight:600;
      text-transform:uppercase;
      letter-spacing:0.04em;
    }
    .meta-card strong{
      color:#10213f;
      font-size:16px;
      line-height:1.5;
      font-weight:800;
    }

    /* CONTACT */
    .contact-wrap{
      margin-top:34px;
      display:grid;
      grid-template-columns:1.1fr 0.9fr;
      gap:28px;
    }
    .contact-card,
    .contact-box{
      background:#fff;
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:32px;
    }
    .contact-card h3,
    .contact-box h3{
      font-size:28px;
      font-weight:800;
      color:#0d1c38;
      margin-bottom:14px;
    }
    .contact-card p,
    .contact-box p{
      color:#5b677c;
      line-height:1.9;
      font-size:16px;
    }
    .contact-actions{
      margin-top:24px;
      display:grid;
      gap:16px;
    }
    .contact-action{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:18px 20px;
      border:1px solid #e8edf6;
      border-radius:18px;
      background:#f9fbff;
      transition:0.25s ease;
    }
    .contact-action:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 30px rgba(13, 38, 76, 0.08);
    }
    .contact-action-left{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }
    .contact-icon{
      width:52px;height:52px;border-radius:16px;
      display:flex;align-items:center;justify-content:center;
      font-size:24px;flex-shrink:0;
    }
    .wa-bg{
      background:linear-gradient(180deg,#ebfff6,#d8ffef);
      color:#0faa73;
    }
    .mail-bg{
      background:linear-gradient(180deg,#eef5ff,#deebff);
      color:#2563ff;
    }
    .contact-action strong{
      display:block;
      font-size:16px;
      color:#10213f;
      font-weight:800;
      margin-bottom:2px;
    }
    .contact-action span{
      color:#64748b;
      font-size:14px;
      line-height:1.5;
      word-break:break-word;
    }
    .contact-arrow{
      font-size:22px;
      color:#94a3b8;
      flex-shrink:0;
    }
    .contact-box ul{
      margin-top:18px;
      display:grid;
      gap:14px;
    }
    .contact-box li{
      list-style:none;
      color:#22314d;
      line-height:1.8;
      display:flex;
      gap:12px;
      align-items:flex-start;
    }
    .contact-box li::before{
      content:"•";
      color:#2563ff;
      font-size:20px;
      line-height:1;
      margin-top:2px;
    }

    /* LEGAL */
    .legal-grid{
      margin-top:34px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:18px;
    }
    .legal-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:24px 20px;
    }
    .legal-card h3{
      font-size:18px;
      font-weight:800;
